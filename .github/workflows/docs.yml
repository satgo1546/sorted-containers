name: Publish docs
on:
  release:
    types:
    - published
  workflow_dispatch:
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pages: write
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: 24
    - uses: pnpm/action-setup@v5
      with:
        run_install: true
    - run: |
        npx typedoc
    - uses: actions/upload-pages-artifact@v4
      with:
        path: _site
    - uses: actions/deploy-pages@v4
      id: deployment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
